<!DOCTYPE html>
<html>
<head>
<title>Blood Donation</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

/* light red pulse */

.pulse{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4d4d;
opacity:0.08;
animation:pulse 2s infinite;
z-index:-2;
}

@keyframes pulse{
0%{opacity:0.05;}
50%{opacity:0.25;}
100%{opacity:0.05;}
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.content{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:12px 25px;
border:none;
background:#ff4d4d;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;

}

.explore-btn {
            margin-top: 40px;
            padding: 18px 55px;
            font-size: 20px;
            font-weight: 900;
            color: white;
            background: #ff0033;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.7), 
                        0 0 50px rgba(255, 0, 51, 0.4);
        }

        .explore-btn:hover {
            transform: scale(1.1) translateY(-5px);
            background: #ff1a4d;
            box-shadow: 0 0 40px rgba(255, 0, 51, 1), 
                        0 0 80px rgba(255, 0, 51, 0.8),
                        0 0 120px rgba(255, 0, 51, 0.5);
        }

        .explore-btn:active { transform: scale(0.95); }


</style>
</head>

<body>

<div class="pulse"></div>

<canvas id="canvas"></canvas>

<div class="content">
<h1>Blood Donation System</h1>
<p>Donate Blood Save Life ❤️</p>
<button class="explore-btn" onclick="location.href='/dashboard'">Explore BloodConnect</button>
</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cells=[];

for(let i=0;i<60;i++){
cells.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*15+8,
speed:Math.random()*0.6+0.2
});
}

function drawCell(x,y,size){

ctx.beginPath();
ctx.arc(x,y,size,0,Math.PI*2);
ctx.fillStyle="#ff3333";
ctx.fill();

ctx.beginPath();
ctx.arc(x,y,size/2,0,Math.PI*2);
ctx.fillStyle="#ff8080";
ctx.fill();

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

cells.forEach(c=>{

drawCell(c.x,c.y,c.size);

c.y -= c.speed;

if(c.y < -20){
c.y = canvas.height + 20;
c.x = Math.random()*canvas.width;
}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
