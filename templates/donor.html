<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Donor | BloodConnect</title>
    <style>
        body { 
            background: #0b0e14; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { 
            background: #161b22; 
            padding: 40px; 
            border-radius: 20px; 
            width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            animation: fadeIn 0.8s ease;
            border: 1px solid #30363d;
        }

        h2 { 
            text-align: center; 
            color: #ff0033; 
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px;
            border-radius: 8px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #ff0033; }

        /* NEON SUBMIT BUTTON */
        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            background: #ff0033; 
            color: white; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase;
            margin-top: 20px;
        }

        .btn-submit:hover { 
            background: #ff1a4d; 
            transform: translateY(-3px); 
            box-shadow: 0 0 20px #ff0033; 
        }

        .btn-submit:active { transform: translateY(0); }

        .back-link {
            margin-top: 20px;
            display: block;
            text-align: center;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Donor Registration</h2>
        <form id="donorForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <select id="blood" required>
                    <option value="" disabled selected>Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <input type="text" id="phone" placeholder="Phone Number (with +91)" required>
            </div>

            <div class="form-group">
                <select id="city" required>
                    <option value="PUDUCHERRY">Puducherry</option>
                    <option value="CHENNAI">Chennai</option>
                    <option value="MUMBAI">Mumbai</option>
                </select>
            </div>

            <button type="button" class="btn-submit" onclick="registerDonor()">Register Now</button>
        </form>
        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        async function registerDonor() {
            const formData = {
                name: document.getElementById('name').value,
                blood: document.getElementById('blood').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value
            };

            // Basic validation check
            if(!formData.name || !formData.blood || !formData.phone) {
                alert("Please fill all fields!");
                return;
            }

            const response = await fetch('/api/register_donor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (result.status === 'success') {
                alert("Registration Successful! You are now a life-saver.");
                
                // REFRESH THE FORM AFTER SUBMIT
                document.getElementById('donorForm').reset();
            } else {
                alert("Something went wrong. Please try again.");
            }
        }
    </script>
</body>
</html>
