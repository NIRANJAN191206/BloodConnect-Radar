<!DOCTYPE html>
<html>
<head>
    <title>Live Donor Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .control-panel { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(30, 41, 59, 0.9); padding: 20px; border-radius: 15px; width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #334155; color: white;
        }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; background: #0f172a; color: white; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* THE RADAR SPOT (Blue Circle) */
        .donor-spot {
            width: 15px; height: 15px; background: #3b82f6; border-radius: 50%;
            border: 2px solid white; box-shadow: 0 0 10px #3b82f6;
        }
        .spot-label {
            background: white; color: black; padding: 2px 8px; border-radius: 4px;
            font-weight: bold; font-size: 11px; white-space: nowrap;
            position: relative; top: -30px; left: 10px; border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>Radar Search</h3>
        <input id="bloodGroup" placeholder="Enter Blood (e.g. O+)">
        <button onclick="updateRadar()">Scan Radar</button>
        <hr style="opacity:0.2; margin:15px 0;">
        <a href="/" style="color:#94a3b8; text-decoration:none; font-size:12px;">← Back to Home</a>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map').setView([20.59, 78.96], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let donorMarkers = L.layerGroup().addTo(map);

        async function updateRadar() {
            const bg = document.getElementById('bloodGroup').value.toUpperCase();
            if(!bg) return alert("Enter blood group");

            const response = await fetch(`/api/get_donors?blood=${encodeURIComponent(bg)}`);
            const donors = await response.json();

            donorMarkers.clearLayers(); // Remove old spots

            if (donors.length === 0) {
                alert("No donors found for this group.");
                return;
            }

            donors.forEach(donor => {
                console.log("Pinning donor:", donor.name, "at", donor.lat, donor.lon);
                
                // Create a custom spot icon
                const spotIcon = L.divIcon({
                    className: 'custom-spot',
                    html: `<div class="donor-spot"></div><div class="spot-label">${donor.name} (${donor.blood})</div>`
                });

                // Add the spot to the map
                L.marker([donor.lat, donor.lon], { icon: spotIcon }).addTo(donorMarkers);
            });

            // Zoom map to the first spot found
            map.flyTo([donors[0].lat, donors[0].lon], 8);
        }
    </script>
</body>
</html>
