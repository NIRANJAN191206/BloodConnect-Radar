<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        /* Animation & Hover for Buttons */
        .btn { 
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 8px; border: none; 
            background: linear-gradient(45deg, #ef4444, #b91c1c); color: white; font-weight: bold; 
            cursor: pointer; transition: all 0.3s ease; transform: scale(1);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        .btn:active { transform: scale(0.95); }
        
        a { color: #94a3b8; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Donor Registration</h2>
        <input id="name" placeholder="Full Name">
        <input id="blood" placeholder="Blood Group (e.g., O+)">
        <input id="phone" placeholder="Phone Number">
        <input id="city" placeholder="City (Mumbai/Chennai/Delhi)">
        <button class="btn" onclick="submitForm()">Register Now</button>
        <a href="/">← Back to Home</a>
    </div>

    <script>
        async function submitForm() {
            const data = {
                name: document.getElementById('name').value,
                blood: document.getElementById('blood').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value
            };
            const res = await fetch('/api/register_donor', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("Registration Successful!");
                window.location.reload(); // Refreshes form as requested
            }
        }
    </script>
</body>
</html>
