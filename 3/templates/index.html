<!DOCTYPE html>
<html>
<head>
    <title>BloodConnect Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hero { text-align: center; background: #1e293b; padding: 50px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { font-size: 3em; margin-bottom: 10px; color: #ef4444; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .nav-card { 
            background: #334155; padding: 25px; border-radius: 15px; text-decoration: none; color: white; 
            font-weight: bold; transition: 0.3s; border: 2px solid transparent;
        }
        .nav-card:hover { transform: translateY(-10px); border-color: #ef4444; background: #475569; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }
        .icon { font-size: 2em; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🩸 BloodConnect</h1>
        <p>Real-time Emergency Blood Radar System</p>
        <div class="nav-grid">
            <a href="/donor_page" class="nav-card">
                <span class="icon">🙋‍♂️</span> Donor Portal
            </a>
            <a href="/receiver_page" class="nav-card">
                <span class="icon">🏥</span> Request Blood
            </a>
            <a href="/map_page" class="nav-card">
                <span class="icon">📡</span> Live Radar
            </a>
        </div>
    </div>
</body>
</html>
